<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0"> <!-- displays site properly based on user's device -->
  <link rel="icon" type="image/png" sizes="32x32" href="./images/favicon-32x32.png">
  <title>Frontend Mentor | Profile card component</title>
  <link rel="stylesheet" href="./css/style.css">
</head>
<body>
	<div class="background">
		<img class="top-circle" src="./images/bg-pattern-top.svg" alt="">
		<p class="text-align-right">
			<img class="bottom-circle" src="./images/bg-pattern-bottom.svg" alt="">
		</p>
	</div>
	<div class="content">
		<img src="./images/bg-pattern-card.svg" alt="">
		<div>
			<img src="./images/image-victor.jpg" class="profile-picture" alt="">
		</div>
		<div>
			<span class="name">Victor Crest</span><span class="age">26</span>
		</div>
	  <span class="city">London</span>
		<div class="line"></div>
		<div class="stats">
			<div class="stat">
				<span class="amount">80K</span>
				<span class="description">Followers</span>
			</div>
			<div class="stat">
				<span class="amount">803K</span>
				<span class="description">Likes</span>
			</div>
			<div class="stat">
				<span class="amount">1.4K</span>
				<span class="description">Photos</span>
			</div>
		</div>
	</div>
</body>
</html>
